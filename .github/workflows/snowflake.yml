name: Snowflake CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-sql:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Install required dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libnsl-dev libssl-dev

      # 3️⃣ Install SnowSQL (FIXED VERSION)
      - name: Install SnowSQL
        run: |
          echo "Downloading SnowSQL..."
          curl -L -o snowsql.sh https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.29-linux_x86_64.bash

          chmod +x snowsql.sh

          echo "Installing SnowSQL..."
          mkdir -p $HOME/snowsql

          # Ignore false failure from installer
          bash snowsql.sh -y --install-dir $HOME/snowsql || true

          echo "Adding SnowSQL to PATH..."
          echo "$HOME/snowsql/bin" >> $GITHUB_PATH

      # 4️⃣ Verify installation
      - name: Verify SnowSQL
        run: |
          $HOME/snowsql/bin/snowsql --version

      # 5️⃣ Execute SQL files
      - name: Execute SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          echo "Running students.sql..."
          snowsql -a $SNOWFLAKE_ACCOUNT \
                   -u $SNOWFLAKE_USER \
                   -p "$SNOWFLAKE_PASSWORD" \
                   -w $SNOWFLAKE_WAREHOUSE \
                   -d $SNOWFLAKE_DATABASE \
                   -s $SNOWFLAKE_SCHEMA \
                   -f sql/students.sql

          echo "Running orders.sql..."
          snowsql -a $SNOWFLAKE_ACCOUNT \
                   -u $SNOWFLAKE_USER \
                   -p "$SNOWFLAKE_PASSWORD" \
                   -w $SNOWFLAKE_WAREHOUSE \
                   -d $SNOWFLAKE_DATABASE \
                   -s $SNOWFLAKE_SCHEMA \
                   -f sql/orders.sql