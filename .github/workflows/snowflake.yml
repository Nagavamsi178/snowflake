name: Snowflake CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-sql:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install Snowflake Connector
      - name: Install Snowflake Connector
        run: |
          pip install snowflake-connector-python

      # 4️⃣ Execute SQL Files
      - name: Execute SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          python <<EOF
import snowflake.connector
import os

print("🔌 Connecting to Snowflake...")

conn = snowflake.connector.connect(
    user=os.environ["SNOWFLAKE_USER"],
    password=os.environ["SNOWFLAKE_PASSWORD"],
    account=os.environ["SNOWFLAKE_ACCOUNT"],
    warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
    database=os.environ["SNOWFLAKE_DATABASE"],
    schema=os.environ["SNOWFLAKE_SCHEMA"]
)

print("✅ Connected successfully")

def run_sql_file(file_path):
    print(f"📂 Running file: {file_path}")

    with open(file_path, 'r') as f:
        sql_script = f.read()

    # Split SQL statements safely
    statements = sql_script.split(";")

    for stmt in statements:
        stmt = stmt.strip()
        if stmt:
            try:
                conn.cursor().execute(stmt)
                print(f"✔ Executed: {stmt[:50]}...")
            except Exception as e:
                print(f"❌ Error: {e}")
                raise e  # Fail pipeline immediately

# Run SQL files
run_sql_file("sql/students.sql")
run_sql_file("sql/orders.sql")

print("🎉 All SQL scripts executed successfully!")

conn.close()
EOF